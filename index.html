  <style>
body {
  background-color: #0d0d0e;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* ================= CARD ================= */
.liquid-glass-card {
  width: 100%;
  max-width: 380px;

  position: relative;
  border-radius: 28px;

  padding: 20px;
  margin-bottom: 18px;

  color: white;

  background: rgba(18, 18, 20, 0.72);

  border: none;

  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  overflow: hidden;

  transition: 0.25s ease;

  z-index: 0;
}

/* ================= OUTER GREY BORDER ================= */
.liquid-glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;

  padding: 1px;

  background: rgba(160,160,160,0.25);

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;

  z-index: 1;
}

/* ================= INNER PINK BORDER ================= */
.liquid-glass-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;

  background: linear-gradient(
    145deg,
    rgba(252,194,215,0.05),
    rgba(252,194,215,0.25),
    rgba(252,194,215,0.05)
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;

  transition: 0.25s ease;

  z-index: 2;
}

/* ================= HOVER EFFECT ================= */
.liquid-glass-card:hover {
  transform: translateY(-3px);
}

/* ================= NEON HOVER BORDER ================= */
.liquid-glass-card:hover::after {
  background: linear-gradient(
    145deg,
    rgba(255,105,180,0.0),
    rgba(255,105,180,0.95),
    rgba(255,105,180,0.0)
  );

  filter: drop-shadow(0 0 8px rgba(255,105,180,0.8))
          drop-shadow(0 0 16px rgba(252,194,215,0.6));
}

/* ================= CONTENT ABOVE LAYERS ================= */
.liquid-glass-card > * {
  position: relative;
  z-index: 3;
}

/* ================= ROW ================= */
.leaderboard-row {
  display: grid;
  grid-template-columns: 165px 1fr;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: 18px;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
}

.leaderboard-row:hover {
  background: rgba(252,194,215,0.06);
}

/* ================= IMAGES ================= */
.avatar {
  width: 165px;
  height: 165px;
  border-radius: 20px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1);
}

.name-img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}

/* ================= SPOTIFY ================= */
.spotify-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.spotify-cover {
  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.25s ease;
}

.spotify-cover:hover {
  transform: scale(1.02);
}
    
  </style>
</head>
