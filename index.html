<style>

/* ================= BODY ================= */

body{
background:#0d0d0e;
margin:0;
padding:40px 20px;
min-height:100vh;
box-sizing:border-box;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
font-family:'Inter',sans-serif;
}

/* ================= ANIMATIONS ================= */

@keyframes pulseGlow{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(252,194,215,.35);
}
50%{
transform:scale(1.02);
box-shadow:0 0 28px 8px rgba(252,194,215,.22);
}
100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(252,194,215,0);
}
}

/* ================= MAIN CARD ================= */

.liquid-glass-card{
width:100%;
max-width:380px;

background:
linear-gradient(
145deg,
rgba(38,30,34,.92),
rgba(18,15,18,.96),
rgba(8,8,10,.99)
);

border-radius:48px;

padding:28px 18px;

position:relative;
overflow:hidden;

border:1px solid rgba(252,194,215,.14);

backdrop-filter:blur(24px) saturate(140%);
-webkit-backdrop-filter:blur(24px) saturate(140%);

box-shadow:
inset 0 1px 2px rgba(255,255,255,.08),
inset 0 -10px 25px rgba(0,0,0,.45),
0 18px 45px rgba(0,0,0,.7),
0 0 40px rgba(252,194,215,.08);

color:white;
}

/* top sheen */

.liquid-glass-card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:38%;

background:
linear-gradient(
to bottom,
rgba(252,194,215,.08),
transparent
);

pointer-events:none;
}

/* ================= HEADER ================= */

.card-header{
text-align:center;
margin-bottom:26px;
position:relative;
z-index:2;
}

.card-header img{
max-width:92%;
height:auto;
display:inline-block;
}

/* ================= TOP CHADS ROW ================= */

.leaderboard-row{
display:grid;
grid-template-columns:165px 1fr;

align-items:center;
gap:15px;

padding:12px 10px;
border-radius:34px;

transition:.25s ease;

position:relative;
z-index:2;
}

.leaderboard-row:hover{
background:rgba(252,194,215,.06);
animation:pulseGlow 1.5s infinite;
}

/* ================= AVATAR ================= */

.avatar-link{
width:165px;
height:165px;

display:block;
flex-shrink:0;

border-radius:38px;
overflow:hidden;

border:2px solid rgba(252,194,215,.65);

box-shadow:
0 8px 22px rgba(0,0,0,.4),
0 0 20px rgba(252,194,215,.08);

transition:.25s ease;
}

.avatar-link:hover{
transform:scale(1.03);
}

.avatar-link img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* ================= NAME IMAGE ================= */

.name-link{
display:block;
text-decoration:none;
}

.name-link img{
width:100%;
max-height:120px;
object-fit:contain;
display:block;
}

/* ================= SPACING ================= */

.space{
height:20px;
}

/* ================= PLAYLIST CARD ================= */

.playlist-card{
text-align:center;
}

/* playlist image */

.playlist-cover-link{
display:inline-block;

border-radius:38px;
overflow:hidden;

border:2px solid rgba(252,194,215,.65);

box-shadow:
0 10px 30px rgba(0,0,0,.45),
0 0 24px rgba(252,194,215,.08);

transition:.25s ease;
}

.playlist-cover-link:hover{
animation:pulseGlow 1.5s infinite;
transform:scale(1.02);
}

/* IMPORTANT */
/* THIS MAKES IT BIG + SQUARE */

.playlist-cover{
width:290px;
height:290px;

display:block;
object-fit:cover;
}

/* ================= QUOTE / TEXT BELOW IMAGE ================= */

.playlist-quote{
margin-top:16px;
position:relative;
z-index:2;
}

.playlist-quote img{
max-width:82%;
height:auto;
display:inline-block;
}

/* ================= SPOTIFY @ ================= */

.spotify-at{
margin-top:14px;
font-size:13px;
font-weight:700;
letter-spacing:.5px;

color:rgba(255,255,255,.78);
}

.spotify-at a{
color:#fcbdd4;
text-decoration:none;
transition:.2s ease;
}

.spotify-at a:hover{
opacity:.8;
}

/* ================= MOBILE ================= */

@media(max-width:480px){

.leaderboard-row{
grid-template-columns:135px 1fr;
gap:12px;
}

.avatar-link{
width:135px;
height:135px;
}

.playlist-cover{
width:250px;
height:250px;
}

}

</style>
