<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vigil</title>

<style>
body {
  background-color: #0d0d0e;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* ================= CARD ================= */
.liquid-glass-card {
  width: 100%;
  max-width: 380px;

  position: relative;
  border-radius: 28px;

  padding: 20px;
  margin-bottom: 18px;

  color: white;

  background: rgba(18, 18, 20, 0.72);

  overflow: hidden;

  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  transition: 0.25s ease;
}

/* ================= OUTER CHARGING BORDER ================= */
.liquid-glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;

  background: linear-gradient(
    90deg,
    rgba(160,160,160,0.25),
    rgba(252,194,215,0.35),
    rgba(255,105,180,0.25),
    rgba(160,160,160,0.25)
  );

  background-size: 300% 300%;
  animation: borderFlow 4s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
  z-index: 1;
}

@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* ================= INNER GLASS BORDER ================= */
.liquid-glass-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;

  background: linear-gradient(
    145deg,
    rgba(252,194,215,0.10),
    rgba(252,194,215,0.30),
    rgba(252,194,215,0.10)
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
  z-index: 2;

  transition: 0.3s ease;
}

/* ================= HOVER NEON ================= */
.liquid-glass-card:hover {
  transform: translateY(-3px);
}

.liquid-glass-card:hover::after {
  background: linear-gradient(
    145deg,
    rgba(255,105,180,0.0),
    rgba(255,105,180,0.9),
    rgba(255,105,180,0.0)
  );

  filter: drop-shadow(0 0 10px rgba(255,105,180,0.8))
          drop-shadow(0 0 20px rgba(252,194,215,0.6));
}

/* CONTENT ABOVE LAYERS */
.liquid-glass-card > * {
  position: relative;
  z-index: 3;
}

/* ================= ROW ================= */
.leaderboard-row {
  display: grid;
  grid-template-columns: 165px 1fr;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: 18px;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
}

.leaderboard-row:hover {
  background: rgba(252,194,215,0.06);
}

/* ================= IMAGES ================= */
.avatar {
  width: 165px;
  height: 165px;
  border-radius: 20px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
}

.name-img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}

/* ================= SPOTIFY ================= */
.spotify-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.spotify-cover {
  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.12);
  transition: 0.25s ease;
}

.spotify-cover:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<!-- ================= LEADERBOARD ================= -->
<div class="liquid-glass-card">

  <div style="text-align:center; margin-bottom:15px;">
    <img src="header.png" style="max-width:90%;">
  </div>

  <a class="leaderboard-row" href="https://www.tiktok.com/@zeta.psl" target="_blank">
    <img class="avatar" src="Zeta.png">
    <img class="name-img" src="zeta1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@humblemogger" target="_blank">
    <img class="avatar" src="vmog.png">
    <img class="name-img" src="vmog1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@derbforprez" target="_blank">
    <img class="avatar" src="Derb.png">
    <img class="name-img" src="derb1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@clavicular" target="_blank">
    <img class="avatar" src="Clav.png">
    <img class="name-img" src="clav1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@unbancookie" target="_blank">
    <img class="avatar" src="C.K.png">
    <img class="name-img" src="C.K1.png">
  </a>

</div>

<!-- ================= SPOTIFY ================= -->
<div class="liquid-glass-card" style="text-align:center;">

  <div style="margin-bottom:15px;">
    <img src="playlist.png" style="max-width:85%;">
  </div>

  <div class="spotify-wrap">
    <a href="https://open.spotify.com/playlist/1Il367YYJIwXrlpR7F0pPT" target="_blank">
      <img class="spotify-cover" src="whoisthis.webp">
    </a>
  </div>

  <div style="margin-top:10px;">
    <img src="svdst.png" style="width:90px; opacity:0.7;">
  </div>

</div>

</body>
</html>
