<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Sidebar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0b;
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
padding:28px 14px;
overflow-x:hidden;
}

/* BACKGROUND */

body::before{
content:'';
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 20%,rgba(255,180,220,.08),transparent 30%),
radial-gradient(circle at 80% 10%,rgba(255,255,255,.04),transparent 25%),
linear-gradient(180deg,#070708,#0d0d10,#070708);

z-index:-3;
}

body::after{
content:'';
position:fixed;
inset:0;

background:
repeating-linear-gradient(
90deg,
transparent 0px,
transparent 38px,
rgba(255,255,255,.015) 39px,
transparent 40px
);

opacity:.55;

animation:bgMove 12s linear infinite;

z-index:-2;
}

@keyframes bgMove{
from{transform:translateX(0);}
to{transform:translateX(40px);}
}

/* WRAPPER */

.sidebar{
width:100%;
max-width:340px;

display:flex;
flex-direction:column;
gap:18px;
}

/* CARD */

.glass-card{

position:relative;
overflow:hidden;

border-radius:34px;

padding:18px;

background:
linear-gradient(
145deg,
rgba(30,24,28,.92),
rgba(15,12,14,.96)
);

border:1px solid rgba(255,210,230,.12);

backdrop-filter:blur(18px) saturate(140%);
-webkit-backdrop-filter:blur(18px) saturate(140%);

box-shadow:
0 10px 35px rgba(0,0,0,.55),
inset 0 1px 0 rgba(255,255,255,.05),
0 0 25px rgba(255,180,220,.05);
}

/* SHINE */

.glass-card::before{
content:'';

position:absolute;
top:0;
left:0;
right:0;
height:38%;

background:
linear-gradient(
to bottom,
rgba(255,255,255,.06),
transparent
);

pointer-events:none;
}

/* HEADER */

.hero{
text-align:center;
padding-top:6px;
}

.hero img{
max-width:90%;
height:auto;
display:block;
margin:auto;
}

/* TITLE */

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:2px;
text-transform:uppercase;
color:#ffdae8;

margin-bottom:12px;

display:flex;
align-items:center;
gap:8px;
}

.section-title::before{
content:'';
width:8px;
height:8px;
border-radius:50%;

background:#ffd5e7;

box-shadow:
0 0 10px rgba(255,210,230,.9);
}

/* LEADERBOARD */

.lb-wrap{
display:flex;
flex-direction:column;
gap:10px;
}

.lb-row{

display:grid;
grid-template-columns:78px 1fr;
gap:12px;

align-items:center;

padding:10px;

border-radius:22px;

transition:.2s ease;

text-decoration:none;
color:#fff;

background:
linear-gradient(
145deg,
rgba(255,255,255,.03),
rgba(255,255,255,.015)
);

border:1px solid rgba(255,255,255,.05);
}

.lb-row:hover{

transform:translateY(-2px);

background:
linear-gradient(
145deg,
rgba(255,255,255,.07),
rgba(255,255,255,.03)
);

border-color:rgba(255,220,235,.18);

box-shadow:
0 0 18px rgba(255,180,220,.12);
}

/* PFP */

.lb-pfp{
width:78px;
height:78px;

border-radius:20px;

object-fit:cover;

border:2px solid rgba(255,210,230,.28);

box-shadow:
0 4px 12px rgba(0,0,0,.35);
}

/* TEXT */

.lb-name{
font-size:14px;
font-weight:800;
color:#fff;

line-height:1.2;
}

.lb-rank{
font-size:11px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;

color:#ffbfd8;

margin-bottom:5px;
}

/* PLAYLIST CARD */

.playlist-card{
text-align:center;
}

.playlist-image{

width:100%;
border-radius:26px;

overflow:hidden;

display:block;

border:1px solid rgba(255,210,230,.16);

box-shadow:
0 8px 24px rgba(0,0,0,.45);

transition:.22s ease;
}

.playlist-image:hover{

transform:translateY(-3px) scale(1.01);

box-shadow:
0 0 25px rgba(255,180,220,.15),
0 12px 30px rgba(0,0,0,.5);
}

.playlist-image img{
width:100%;
display:block;
object-fit:cover;
}

/* USERNAME */

.playlist-user{

margin-top:12px;

display:inline-block;

font-size:13px;
font-weight:700;

color:#ffd4e6;

text-decoration:none;

transition:.18s ease;
}

.playlist-user:hover{
opacity:.8;
}

/* FOOTER */

.footer{
text-align:center;

font-size:10px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;

color:#6e6570;

margin-top:2px;
}

</style>
</head>
