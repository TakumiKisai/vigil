<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>help me</title>

<style>
body {
  background-color: #0d0d0e;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* ================= CARD ================= */
.liquid-glass-card {
  width: 100%;
  max-width: 380px;
  position: relative;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 18px;
  color: white;
  overflow: hidden;

  background: rgba(18, 18, 20, 0.65);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);

  transition: transform 0.25s ease;
}

/* ================= OUTER BORDER (GREY → NEON CHARGE) ================= */
.liquid-glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: inherit;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.25),
    rgba(120,120,120,0.25),
    rgba(252,194,215,0.35),
    rgba(255,255,255,0.2)
  );

  background-size: 300% 300%;
  animation: borderFlow 5s linear infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}

/* OUTER ANIMATION */
@keyframes borderFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* ================= INNER BORDER (TRANSLUCENT PINK GLASS) ================= */
.liquid-glass-card::after {
  content: "";
  position: absolute;
  inset: 6px;
  border-radius: 22px;

  background: linear-gradient(
    135deg,
    rgba(252,194,215,0.10),
    rgba(255,255,255,0.05),
    rgba(252,194,215,0.08)
  );

  background-size: 200% 200%;
  animation: innerGlow 6s ease infinite;

  pointer-events: none;
}

/* INNER ANIMATION */
@keyframes innerGlow {
  0% { background-position: 0% 50%; opacity: 0.7; }
  50% { background-position: 100% 50%; opacity: 1; }
  100% { background-position: 0% 50%; opacity: 0.7; }
}

/* ================= CONTENT ABOVE LAYERS ================= */
.liquid-glass-card > * {
  position: relative;
  z-index: 2;
}

/* ================= HOVER ================= */
.liquid-glass-card:hover {
  transform: translateY(-3px);
}

.liquid-glass-card:hover::before {
  filter: brightness(1.6);
}

/* ================= ROWS ================= */
.leaderboard-row {
  display: grid;
  grid-template-columns: 165px 1fr;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: 18px;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
}

.leaderboard-row:hover {
  background: rgba(252,194,215,0.06);
}

/* ================= IMAGES ================= */
.avatar {
  width: 165px;
  height: 165px;
  border-radius: 20px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
}

.name-img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}

/* ================= SPOTIFY ================= */
.spotify-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.spotify-cover {
  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.12);
  transition: 0.25s ease;
}

.spotify-cover:hover {
  transform: scale(1.02);
}

</style>
</head>

<body>

<!-- ================= TOP CHADS ================= -->

  </div>

  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@humblemogger" target="_blank">

  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@derbforprez" target="_blank">
    <img class="avatar" src="Derb.png">

  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@clavicular" target="_blank">
