<!DOCTYPE html>

  <title>Leaderboard Preview</title>
  
  <!-- Style Block for animations, backgrounds, and liquid glass styles -->
  <style>
    /* Full-screen dark container locked down for previewing contrast */
    body {
      background-color: #0d0d0e; 
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(252, 194, 215, 0.4);
      }
      50% {
        transform: scale(1.02);
        box-shadow: 0 0 20px 8px rgba(252, 194, 215, 0.35);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(252, 194, 215, 0);
      }
    }

    /* Dark Plum Liquid Glass Style */
    .liquid-glass-card {
      background: linear-gradient(
        145px, 
        rgba(38, 30, 34, 0.88) 0%, 
        rgba(20, 16, 18, 0.94) 50%, 
        rgba(10, 8, 9, 0.98) 100%
      );
      backdrop-filter: blur(30px) saturate(140%);
      -webkit-backdrop-filter: blur(30px) saturate(140%);
      border: 1px solid rgba(252, 194, 215, 0.22); 
      box-shadow: 
        inset 0 1px 3px rgba(255, 255, 255, 0.15), 
        inset 0 -3px 20px rgba(0, 0, 0, 0.7),
        0px 20px 45px rgba(0, 0, 0, 0.8),
        0px 0px 35px 5px rgba(252, 194, 215, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      border-radius: 55px;
      box-sizing: border-box;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }

    /* Soft pink sheen effect */
    .liquid-glass-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, rgba(252, 194, 215, 0.08) 0%, rgba(252, 194, 215, 0) 100%);
      pointer-events: none;
    }

    /* Row layout transformed into an anchor-friendly block */
    .leaderboard-row {
      display: grid;
      grid-template-columns: 165px 1fr;
      align-items: center; 
      gap: 15px; 
      transition: all 0.3s ease;
      cursor: pointer;
      padding: 15px 10px; 
      border-radius: 42px;
      text-decoration: none; 
      color: inherit;
    }

    .leaderboard-row:hover {
      animation: pulseGlow 1.5s infinite ease-in-out;
      background: rgba(252, 194, 215, 0.08);
    }

    /* Single-graphic layout engine wrapper */
    .text-container {
      display: block;
      line-height: 0;
    }

    .spotify-pulse {
      transition: all 0.3s ease;
    }

    .spotify-pulse:hover {
      animation: pulseGlow 1.5s infinite ease-in-out;
    }
  </style>
</head>
