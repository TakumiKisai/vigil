<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vigil sidebar</title>

<style>
body {
  background:#0d0d0e;
  margin:0;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial, sans-serif;
}

/* ================= CARD ================= */
.liquid-glass-card {
  width:100%;
  max-width:380px;
  position:relative;
  border-radius:30px;
  padding:18px;
  margin-bottom:18px;

  background:rgba(18,18,20,0.65);
  overflow:hidden;

  border:1px solid rgba(255,255,255,0.10);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.04);

  transition:0.35s ease;
}

.liquid-glass-card:hover {
  border:1px solid rgba(252,194,215,0.75);
  box-shadow:
    0 0 25px rgba(252,194,215,0.18),
    0 10px 35px rgba(0,0,0,0.6);
  transform:translateY(-3px);
}

/* inner glow */
.liquid-glass-card::before {
  content:"";
  position:absolute;
  inset:6px;
  border-radius:24px;
  pointer-events:none;

  background:linear-gradient(
    120deg,
    rgba(252,194,215,0.08),
    rgba(255,255,255,0.03),
    rgba(252,194,215,0.06)
  );
}

/* ================= ROW FIX (FULL SIZE + STACKED) ================= */
.leaderboard-row {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;

  padding:12px;
  border-radius:18px;

  text-decoration:none;
  color:white;

  transition:0.25s ease;
}

.leaderboard-row:hover {
  background:rgba(252,194,215,0.08);
  transform:translateY(-2px);
}

/* avatar stays BIG (NOT shrunk) */
.avatar {
  width:165px;
  height:165px;
  border-radius:20px;
  object-fit:cover;
  border:1px solid rgba(255,255,255,0.12);
}

/* name stays same idea */
.name-img {
  width:100%;
  max-height:120px;
  object-fit:contain;
}

/* ================= SPOTIFY ================= */
.spotify-wrap {
  display:flex;
  justify-content:center;
  margin:10px 0;
}

.spotify-cover {
  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:22px;
  border:1px solid rgba(255,255,255,0.12);
  transition:0.3s ease;
}

.spotify-cover:hover {
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(252,194,215,0.18);
}

/* footer */
.footer {
  text-align:center;
  margin-top:10px;
  opacity:0.7;
}

.footer img {
  width:90px;
}
</style>
</head>

<body>

<!-- ================= TOP CHADS ================= -->
<div class="liquid-glass-card">

  <div style="text-align:center; margin-bottom:12px;">
    <img src="header.png" style="max-width:90%;">
  </div>

  <a class="leaderboard-row" href="https://www.tiktok.com/@zeta.psl" target="_blank">
    <img class="avatar" src="Zeta.png">
    <img class="name-img" src="zeta1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@humblemogger" target="_blank">
    <img class="avatar" src="vmog.png">
    <img class="name-img" src="vmog1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@derbforprez" target="_blank">
    <img class="avatar" src="Derb.png">
    <img class="name-img" src="derb1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@clavicular" target="_blank">
    <img class="avatar" src="Clav.png">
    <img class="name-img" src="clav1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com/@unbancookie" target="_blank">
    <img class="avatar" src="C.K.png">
    <img class="name-img" src="C.K1.png">
  </a>

</div>

<!-- ================= SPOTIFY ================= -->
<div class="liquid-glass-card">

  <div style="text-align:center; margin-bottom:12px;">
    <img src="playlist.png" style="max-width:85%;">
  </div>

  <div class="spotify-wrap">
    <a href="https://open.spotify.com/playlist/1Il367YYJIwXrlpR7F0pPT?si=26aKOx0iS6GqEu6kQwI7Og&pi=FNFxcGwRTomYc" target="_blank">
      <img class="spotify-cover" src="whoisthis.webp">
    </a>
  </div>

  <div class="footer">
    <img src="svdst.png">
  </div>

</div>

</body>
</html>
