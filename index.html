<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>help me</title>

<style>
body {
  background-color: #0d0d0e;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* ================= CARD ================= */
.liquid-glass-card {
  width: 100%;
  max-width: 380px;
  position: relative;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 18px;
  color: white;

  background: rgba(15, 15, 18, 0.72);
  overflow: hidden;

  box-shadow: 0 12px 35px rgba(0,0,0,0.65);
  transition: transform 0.25s ease;
}

/* ================= OUTER BORDER (SLOW NEON GLOW) ================= */
.liquid-glass-card::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px;
  border-radius: inherit;

  background: linear-gradient(
    120deg,
    rgba(255,255,255,0.18),
    rgba(140,140,140,0.18),
    rgba(255,80,180,0.30),
    rgba(255,160,210,0.20),
    rgba(255,255,255,0.15)
  );

  background-size: 200% 200%;
  animation: slowFlow 10s ease-in-out infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none;
}

/* slow smooth movement */
@keyframes slowFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ================= INNER BORDER (STATIC GLASS FRAME) ================= */
.liquid-glass-card::after {
  content: "";
  position: absolute;
  inset: 7px;
  border-radius: 22px;

  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 120, 200, 0.18);

  pointer-events: none;
}

/* ================= CONTENT ABOVE LAYERS ================= */
.liquid-glass-card > * {
  position: relative;
  z-index: 2;
}

/* ================= HOVER ================= */
.liquid-glass-card:hover {
  transform: translateY(-2px);
}

.liquid-glass-card:hover::before {
  filter: brightness(1.15);
}

/* ================= ROW ================= */
.leaderboard-row {
  display: grid;
  grid-template-columns: 165px 1fr;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-radius: 18px;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
}

.leaderboard-row:hover {
  background: rgba(252,194,215,0.06);
}

/* ================= IMAGES ================= */
.avatar {
  width: 165px;
  height: 165px;
  border-radius: 20px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.12);
}

.name-img {
  width: 100%;
  max-height: 120px;
  object-fit: contain;
}

/* ================= SPOTIFY ================= */
.spotify-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.spotify-cover {
  width: 260px;
  height: 260px;
  object-fit: cover;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.12);
  transition: 0.25s ease;
}

.spotify-cover:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<!-- ================= TOP CHADS ================= -->
<div class="liquid-glass-card">

  <div style="text-align:center; margin-bottom:15px;">
    <img src="header.png" style="max-width:90%;">
  </div>

  <a class="leaderboard-row" href="https://www.tiktok.com" target="_blank">
    <img class="avatar" src="Zeta.png">
    <img class="name-img" src="zeta1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com" target="_blank">
    <img class="avatar" src="vmog.png">
    <img class="name-img" src="vmog1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com" target="_blank">
    <img class="avatar" src="Derb.png">
    <img class="name-img" src="derb1.png">
  </a>

  <a class="leaderboard-row" href="https://www.tiktok.com" target="_blank">
    <img class="avatar" src="Clav.png">
    <img class="name-img" src="clav1.png">
  </a>

</div>

<!-- ================= SPOTIFY ================= -->
<div class="liquid-glass-card" style="text-align:center;">

  <div style="margin-bottom:15px;">
    <img src="playlist.png" style="max-width:85%;">
  </div>

  <div class="spotify-wrap">
    <a href="https://open.spotify.com" target="_blank">
      <img class="spotify-cover" src="whoisthis.webp">
    </a>
  </div>

  <img src="svdst.png" style="width:90px; opacity:0.7;">

</div>

</body>
</html>
