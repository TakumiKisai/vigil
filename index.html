<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>help me</title>

  <style>
    body {
      background-color: #0d0d0e;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    /* ================= CARD ================= */
    .liquid-glass-card {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(145deg, #1a1a1d, #0f0f10);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      color: white;
      margin-bottom: 18px;
      transition: 0.25s ease;
    }

    .liquid-glass-card:hover {
      border: 1px solid rgba(252,194,215,0.55);
      box-shadow: 0 0 18px rgba(252,194,215,0.15);
      transform: translateY(-2px);
    }

    /* ================= ROW ================= */
    .leaderboard-row {
      display: grid;
      grid-template-columns: 165px 1fr;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      transition: 0.2s ease;
    }

    .leaderboard-row:hover {
      background: rgba(252,194,215,0.06);
    }

    /* ================= IMAGES ================= */
    .avatar {
      width: 165px;
      height: 165px;
      border-radius: 20px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .name-img {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
    }

    /* ================= SPOTIFY ================= */
    .spotify-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .spotify-cover {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.25s ease;
    }

    .spotify-cover:hover {
      transform: scale(1.02);
    }

  </style>
</head>

<body>

  <!-- ================= LEADERBOARD CARD ================= -->
  <div class="liquid-glass-card">

    <!-- HEADER -->
    <div style="text-align:center; margin-bottom:15px;">
      <img src="header.png" style="max-width:90%;">
    </div>

    <!-- ROW 1 -->
    <a class="leaderboard-row" href="https://www.tiktok.com/@zeta.psl?_r=1&_t=ZT-96fB9SUEgFJ" target="_blank">
      <img class="avatar" src="Zeta.png">
      <img class="name-img" src="zeta1.png">
    </a>

    <!-- ROW 2 -->
    <a class="leaderboard-row" href="https://www.tiktok.com/@humblemogger?_r=1&_t=ZT-96fBAOaZ4zF" target="_blank">
      <img class="avatar" src="vmog.png">
      <img class="name-img" src="vmog1.png">
    </a>

    <!-- ROW 3 -->
    <a class="leaderboard-row" href="https://www.tiktok.com/@derbforprez?_r=1&_t=ZT-96fB9WYFrmn" target="_blank">
      <img class="avatar" src="Derb.png">
      <img class="name-img" src="derb1.png">
    </a>

    <!-- ROW 4 -->
    <a class="leaderboard-row" href="https://www.tiktok.com/@clavicular?_r=1&_t=ZT-96fBA5sDmGL" target="_blank">
      <img class="avatar" src="Clav.png">
      <img class="name-img" src="clav1.png">
    </a>

    <!-- ROW 5 -->
    <a class="leaderboard-row" href="https://www.tiktok.com/@unbancookie?_r=1&_t=ZT-96fBIRgn1Hq" target="_blank">
      <img class="avatar" src="C.K.png">
      <img class="name-img" src="C.K1.png">
    </a>

  </div>

  <!-- ================= SPOTIFY CARD ================= -->
  <div class="liquid-glass-card" style="text-align:center;">

    <!-- HEADER -->
    <div style="margin-bottom:15px;">
      <img src="7.png" style="max-width:85%;">
    </div>

    <!-- SPOTIFY COVER -->
    <div class="spotify-wrap">
      <a href="https://open.spotify.com/playlist/1Il367YYJIwXrlpR7F0pPT?si=26aKOx0iS6GqEu6kQwI7Og&pi=FNFxcGwRTomYc" target="_blank">
        <img class="spotify-cover" src="mikami.webp">
      </a>
    </div>

    <!-- FOOTER -->
    <p style="font-size:12px; opacity:0.5; margin:0;">
      by @svdstmusic
    </p>

  </div>

</body>
</html>
